name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Run AI Code Review
        uses: Nikita-Filonov/ai-review@main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

        with:
          mode: inline

          llm: |
            provider: openai
            model: gpt-4o-mini

          vcs: |
            provider: github
